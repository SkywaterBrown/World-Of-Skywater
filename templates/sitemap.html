<div class="archive-header">
    <h2 class="essay-title">{{sitemapPageTitle}}</h2>
    <div class="essay-meta">{{count}} URLs</div>
</div>
<table class="map-table">
    <thead>
        <tr>
            <th>URL</th>
            <th>Last Modified</th>
        </tr>
    </thead>
    <tbody>
        {{rows}}
    </tbody>
</table>
<div class="raw-link">
    <a href="sitemap.xml">View raw XML sitemap</a>
</div>
